<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏕️</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Forzar modo claro: evita que el navegador aplique dark-mode automático -->
    <!-- No es una vulnerabilidad; es una directiva de renderizado estándar -->
    <meta name="color-scheme" content="light" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="Formamos ciudadanos globales con valores, habilidades de vida y espíritu de servicio. Grupo Scout Lima 12 — Lima, Perú." />

    <!-- SEO -->
    <meta name="title"    content="Grupo Scout Lima 12 — Formando Líderes" />
    <meta name="keywords" content="scouts, lima, boy scouts, liderazgo, campamentos, jóvenes, voluntariado, peru" />
    <meta name="robots"   content="index, follow" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://REEMPLAZAR_TU_DOMINIO.com/" />
    <meta property="og:title"       content="Grupo Scout Lima 12 — Formando Líderes" />
    <meta property="og:description" content="Formamos ciudadanos globales con valores, habilidades de vida y espíritu de servicio." />
    <meta property="og:image"       content="https://REEMPLAZAR_OG_IMAGE_URL.jpg" />
    <meta property="og:site_name"   content="Grupo Scout Lima 12" />
    <meta property="og:locale"      content="es_PE" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Grupo Scout Lima 12 — Formando Líderes" />
    <meta name="twitter:description" content="Formamos ciudadanos globales con valores, habilidades de vida y espíritu de servicio." />
    <meta name="twitter:image"       content="https://REEMPLAZAR_OG_IMAGE_URL.jpg" />

    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scout Lima 12" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    
    <title>Sistema de Gestión Boy Scout - Grupo Scout Lima 12</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
